name: Auto-Update AI News Digest

on:
  schedule:
    - cron: '17 */6 * * *'  # Every 6 hours at minute 17 (off-peak)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'update-and-deploy'
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Collect latest AI News (FR/EN)
      run: node scripts/collect-news.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Copy digest to public
      run: mkdir -p public/data && cp data/digest.json public/data/digest.json
    
    - name: Build with Next.js
      run: npm run build
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Commit changes if any
      run: |
        git add -A
        if ! git diff --cached --quiet; then
          git commit -m "📰 Auto-update: $(date +'%Y-%m-%d %H:%M') - New AI News"
          git push
        else
          echo "No changes to commit"
        fi
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
